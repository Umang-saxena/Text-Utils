<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-GLhlTQ8iRABdZLl6O3oVMWSktQOp6b7In1Zl3/Jr59b6EGGoI1aFkw7cmDA6j6gD" crossorigin="anonymous" />
</head>

<body>
    <!-------------------- Navbar ----------------->
    <nav class="navbar navbar-expand-lg bg-body-tertiary bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Text Utils</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="#">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="#">About Us</a>
                    </li>
                </ul>
                <form class="d-flex" role="search">
                    <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search" />
                    <button class="btn btn-outline-success" type="submit">
                        Search
                    </button>
                </form>
            </div>
        </div>
    </nav>
    <div class="alert alert-success" role="alert">
        <h5 class="alert-heading">Text Utils</h5>
        <p>You Can Do Perform Tasks with Your Text Here</p>
    </div>
    <div class="container">
        <form action="/analyse" method="post">{% csrf_token %}
            <h4>Enter Your Text Below</h4>
            <textarea name="text" style="height: 219px; width: 1306px;"></textarea>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="removepunc" id="flexCheckDefault">
                    <label class="form-check-label" for="flexCheckDefault">
                        Remove Punctuations
                    </label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="uppercase"id="flexCheckDefault">
                    <label class="form-check-label" for="flexCheckDefault">
                        To Complete UpperCase
                    </label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="lowercase"id="flexCheckDefault">
                    <label class="form-check-label" for="flexCheckDefault">
                        To Complete LowerCase
                    </label>
                    
                </div>
                <button type="submit">Submit</button>
                <!-- <textarea name="text" style="height: 219px; width: 1306px;"></textarea>
            <br>
            <input type="checkbox" name="removepunc">Remove Punctuations 
            <br>
            <input type="checkbox" name="uppercase">Convert To Full UpperCase 
            <br>
            <input type="checkbox" name="lowercase">Convert To Full LowerCase 
            <br>
            <button type="submit">Submit</button> -->
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-w76AqPfDkMBDXo30jS1Sgez6pr3x5MlQ1ZAGC+nuZB+EYdgRZgiwxhTBTkF7CXvN"
        crossorigin="anonymous"></script>
</body>

</html>
