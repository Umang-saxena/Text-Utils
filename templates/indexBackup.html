<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Utils</title>
</head>
<body>
    <h1>Welcome to Text Analyser Website</h1>
    <h2>Enter Your text Below</h2>
    <form action="/analyse" method="'get">
        <textarea name="text" style="height: 219px; width: 1306px;"></textarea>
        <br>
        <input type="checkbox" name="removepunc">Remove Punctuations 
        <br>
        <input type="checkbox" name="uppercase">Convert To Full UpperCase 
        <br>
        <input type="checkbox" name="lowercase">Convert To Full LowerCase 
        <br>
        <button type="submit">Submit</button>
    </form>
    
</body>
</html>
